<div class="card h-100 shadow-sm">
  <img [src]="'http://localhost:3000' + trip.image" class="card-img-top" [alt]="trip.name"
       style="height:200px; object-fit:cover;"
       onerror="this.src='https://placehold.co/400x200?text=No+Image'">
  <div class="card-body d-flex flex-column">
    <h5 class="card-title">{{ trip.name }}</h5>
    <p class="card-text text-muted small">{{ trip.resort }}</p>
    <p class="card-text small">{{ trip.length }} &nbsp;|&nbsp; Starts: {{ trip.start | date:'mediumDate' }}</p>
    <p class="card-text fw-bold">${{ trip.perPerson }} / person</p>
    <p class="card-text flex-grow-1" style="font-size:0.85rem;">{{ trip.description }}</p>
    <div *ngIf="isAdmin()" class="mt-3 d-flex gap-2">
      <button class="btn btn-outline-primary btn-sm flex-fill" (click)="onEdit()">Edit</button>
      <button class="btn btn-outline-danger  btn-sm flex-fill" (click)="onDelete()">Delete</button>
    </div>
  </div>
</div>
